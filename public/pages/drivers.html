<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drivers — FoodFlow</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-brand"><i data-lucide="utensils-crosses"></i> FoodFlow</a>
      <ul class="nav-links">
        <li><a href="/"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
        <li><a href="/customers"><i data-lucide="users"></i> Customers</a></li>
        <li><a href="/restaurants"><i data-lucide="store"></i> Restaurants</a></li>
        <li><a href="/menu"><i data-lucide="menu"></i> Menu</a></li>
        <li><a href="/orders"><i data-lucide="package"></i> Orders</a></li>
        <li><a href="/drivers" class="active"><i data-lucide="truck"></i> Drivers</a></li>
        <li><a href="/payments"><i data-lucide="credit-card"></i> Payments</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>Drivers Management</h1>
      <button class="btn btn-primary" onclick="openModal('addModal')"><i data-lucide="user-plus"></i> Add
        Driver</button>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Vehicle</th>
            <th>Phone</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h2 id="modalTitle">Add Driver</h2>
      <input type="hidden" id="editId">
      <div class="form-group"><label>Driver ID</label><input type="text" id="fId" placeholder="e.g. D101"></div>
      <div class="form-group"><label>Name</label><input type="text" id="fName"></div>
      <div class="form-group"><label>Vehicle Details</label><input type="text" id="fVehicle"></div>
      <div class="form-group"><label>Phone</label><input type="text" id="fPhone"></div>
      <div class="form-group"><label>Status</label>
        <select id="fStatus">
          <option value="Available">Available</option>
          <option value="On Delivery">On Delivery</option>
          <option value="Offline">Offline</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('addModal')">Cancel</button>
        <button class="btn btn-primary" onclick="save()">Save Driver</button>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/drivers.js"></script>
</body>

</html>
