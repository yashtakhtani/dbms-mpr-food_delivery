<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers — FoodFlow</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="app-container">
    <aside class="sidebar" aria-label="Main navigation">
      <div class="sidebar-header">
        <a href="/" class="sidebar-brand"><i data-lucide="utensils-crossed"></i><span>FoodFlow</span></a>
      </div>
      <nav class="sidebar-nav">
        <a href="/" class="sidebar-link"><i data-lucide="layout-dashboard"></i> Dashboard</a>
        <a href="/customers" class="sidebar-link"><i data-lucide="users"></i> Customers</a>
        <a href="/restaurants" class="sidebar-link"><i data-lucide="store"></i> Restaurants</a>
        <a href="/menu" class="sidebar-link"><i data-lucide="menu"></i> Menu</a>
        <a href="/orders" class="sidebar-link"><i data-lucide="package"></i> Orders</a>
        <a href="/drivers" class="sidebar-link"><i data-lucide="truck"></i> Drivers</a>
        <a href="/payments" class="sidebar-link"><i data-lucide="credit-card"></i> Payments</a>
      </nav>
      <div class="sidebar-footer">
        <button type="button" class="sidebar-link sidebar-link-btn" onclick="logout()"><i data-lucide="log-out"></i> Log out</button>
      </div>
    </aside>
    <div class="main-content">
      <header class="top-bar">
        <div class="user-profile" id="userChip" title="Signed in">
          <div class="user-avatar" id="userAvatar">?</div>
          <span class="user-name" id="userName">Account</span>
        </div>
      </header>
      <main class="page-main">
        <div class="container">
    <div class="page-header">
      <h1>Customers</h1>
      <button class="btn btn-primary" onclick="openModal('addModal')"><i data-lucide="user-plus"></i> Add
        Customer</button>
    </div>
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search customers..." oninput="renderTable()">
    </div>
    <div class="table-toolbar">
      <div class="table-toolbar-left">
        <label class="sr-only" for="sortSelect">Sort table</label>
        <select id="sortSelect" class="table-toolbar-select" onchange="renderTable()">
          <option value="default">Default order</option>
          <option value="asc">Sort: ID ascending</option>
          <option value="desc">Sort: ID descending</option>
          <option value="name">Sort: By name (A–Z)</option>
        </select>
      </div>
      <div class="table-toolbar-right">
        <button type="button" class="btn btn-secondary btn-sm" id="exportCsvBtn"><i data-lucide="download"></i> CSV</button>
        <button type="button" class="btn btn-secondary btn-sm" id="exportPdfBtn"><i data-lucide="file-text"></i> PDF</button>
      </div>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Address</th>
            <th>Phone(s)</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h2 id="modalTitle">Add Customer</h2>
      <input type="hidden" id="editId">
      <div class="form-group"><label>Customer ID</label><input type="text" id="fId" placeholder="e.g. C101"></div>
      <div class="form-group"><label>Name</label><input type="text" id="fName"></div>
      <div class="form-group"><label>Email</label><input type="email" id="fEmail"></div>
      <div class="form-group"><label>Address</label><input type="text" id="fAddress"></div>
      <div class="form-group"><label>Phone (comma-separated)</label><input type="text" id="fPhone"
          placeholder="9876543210"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('addModal')">Cancel</button>
        <button class="btn btn-primary" onclick="save()">Save Customer</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/table-tools.js"></script>
  <script src="/js/customers.js"></script>
</body>

</html>
