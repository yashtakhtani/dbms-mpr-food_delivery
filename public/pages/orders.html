<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — FoodFlow</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="app-container">
    <aside class="sidebar" aria-label="Main navigation">
      <div class="sidebar-header">
        <a href="/" class="sidebar-brand"><i data-lucide="utensils-crossed"></i><span>FoodFlow</span></a>
      </div>
      <nav class="sidebar-nav">
        <a href="/" class="sidebar-link"><i data-lucide="layout-dashboard"></i> Dashboard</a>
        <a href="/customers" class="sidebar-link"><i data-lucide="users"></i> Customers</a>
        <a href="/restaurants" class="sidebar-link"><i data-lucide="store"></i> Restaurants</a>
        <a href="/menu" class="sidebar-link"><i data-lucide="menu"></i> Menu</a>
        <a href="/orders" class="sidebar-link"><i data-lucide="package"></i> Orders</a>
        <a href="/drivers" class="sidebar-link"><i data-lucide="truck"></i> Drivers</a>
        <a href="/payments" class="sidebar-link"><i data-lucide="credit-card"></i> Payments</a>
      </nav>
      <div class="sidebar-footer">
        <button type="button" class="sidebar-link sidebar-link-btn" onclick="logout()"><i data-lucide="log-out"></i> Log out</button>
      </div>
    </aside>
    <div class="main-content">
      <header class="top-bar">
        <div class="user-profile" id="userChip" title="Signed in">
          <div class="user-avatar" id="userAvatar">?</div>
          <span class="user-name" id="userName">Account</span>
        </div>
      </header>
      <main class="page-main">
        <div class="container">
    <div class="page-header">
      <h1>Orders History</h1>
      <button class="btn btn-primary" onclick="openModal('addModal')"><i data-lucide="plus-circle"></i> Place New
        Order</button>
    </div>
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search orders by ID, customer or restaurant..."
        oninput="renderTable()">
    </div>
    <div class="table-toolbar">
      <div class="table-toolbar-left">
        <label class="sr-only" for="sortSelect">Sort table</label>
        <select id="sortSelect" class="table-toolbar-select" onchange="renderTable()">
          <option value="default">Default order</option>
          <option value="asc">Sort: Order ID ascending</option>
          <option value="desc">Sort: Order ID descending</option>
          <option value="name">Sort: By customer name (A–Z)</option>
        </select>
      </div>
      <div class="table-toolbar-right">
        <button type="button" class="btn btn-secondary btn-sm" id="exportCsvBtn"><i data-lucide="download"></i> CSV</button>
        <button type="button" class="btn btn-secondary btn-sm" id="exportPdfBtn"><i data-lucide="file-text"></i> PDF</button>
      </div>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Customer</th>
            <th>Restaurant</th>
            <th>Driver</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h2>Place New Order</h2>
      <div class="form-group"><label>Order ID</label><input type="number" id="fId" placeholder="e.g. 1001"></div>
      <div class="form-group"><label>Order Date</label><input type="date" id="fDate"></div>
      <div class="form-group"><label>Amount (₹)</label><input type="number" id="fAmount" step="0.01"></div>
      <div class="form-group"><label>Customer ID</label><input type="text" id="fCust" placeholder="e.g. C001"></div>
      <div class="form-group"><label>Restaurant ID</label><input type="number" id="fRest"></div>
      <div class="form-group"><label>Driver ID</label><input type="number" id="fDriver"></div>
      <div class="form-group"><label>Payment ID</label><input type="number" id="fPayment"></div>
      <div class="form-group"><label>Food Items (comma-separated names)</label><input type="text" id="fFoods"
          placeholder="e.g. Pizza, Salad"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('addModal')">Cancel</button>
        <button class="btn btn-primary" onclick="save()">Confirm Order</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/table-tools.js"></script>
  <script src="/js/orders.js"></script>
</body>

</html>
